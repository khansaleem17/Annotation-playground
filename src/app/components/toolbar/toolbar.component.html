<div class="flex items-center gap-1 px-3 py-2 bg-surface-1 border-b border-border min-h-[44px] flex-wrap">
  <div class="flex items-center gap-1 mr-4">
    <img src="/instead-logo.svg" alt="Instead" class="h-5 w-auto mr-2" />
    <span class="text-xs text-text-muted">Annotation Playground</span>
  </div>

  <div class="h-5 w-px bg-border mx-2"></div>

  <div class="flex items-center gap-0.5">
    <button
      type="button"
      class="toolbar-btn"
      [class.active]="state.toggles().boundingBoxes"
      (click)="toggle('boundingBoxes')"
    >
      Bounding Boxes
    </button>
    <button
      type="button"
      class="toolbar-btn"
      [class.active]="state.toggles().values"
      (click)="toggle('values')"
    >
      Values
    </button>
    <button
      type="button"
      class="toolbar-btn"
      [class.active]="state.toggles().confidence"
      (click)="toggle('confidence')"
    >
      Confidence
    </button>
    <button
      type="button"
      class="toolbar-btn"
      [class.active]="state.toggles().semanticMetadata"
      (click)="toggle('semanticMetadata')"
    >
      Semantic Metadata
    </button>
    <button
      type="button"
      class="toolbar-btn"
      [class.active]="state.toggles().bindingPaths"
      (click)="toggle('bindingPaths')"
    >
      Binding Paths
    </button>
  </div>

  <div class="h-5 w-px bg-border mx-2"></div>

  <div class="flex items-center gap-0.5">
    <button type="button" class="toolbar-btn icon-btn" title="Zoom In" (click)="zoomIn.emit()">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
    </button>
    <button type="button" class="toolbar-btn icon-btn" title="Zoom Out" (click)="zoomOut.emit()">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4" />
      </svg>
    </button>
    <button type="button" class="toolbar-btn" (click)="fitWidth.emit()">Fit Width</button>
  </div>

  <div class="flex-1"></div>

  <div class="flex items-center gap-3 text-xs text-text-muted font-mono">
    <span><span class="text-text-secondary">{{ state.stats().fields }}</span> Fields</span>
    <span><span class="text-text-secondary">{{ state.stats().groups }}</span> Groups</span>
    <span><span class="text-text-secondary">{{ state.stats().collections }}</span> Collections</span>
  </div>

  <button
    type="button"
    class="toolbar-btn icon-btn ml-3"
    [title]="themeService.theme() === 'light' ? 'Enable dark mode' : 'Enable light mode'"
    [attr.aria-label]="themeService.theme() === 'light' ? 'Enable dark mode' : 'Enable light mode'"
    (click)="themeService.toggle()"
  >
    @if (themeService.theme() === 'light') {
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M20.35 15.35A8 8 0 018.65 3.65 8 8 0 1020.35 15.35z" />
      </svg>
    } @else {
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.36-6.36-1.42 1.42M7.05 16.95l-1.41 1.41m12.73 0-1.42-1.41M7.05 7.05 5.64 5.64M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
    }
  </button>
</div>
